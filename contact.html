<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalkTech | Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-laptop-code"></i><h1>WalkTech <span>Contact</span></h1></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li><li><a href="services.html">Services</a></li>
            <li><a href="portfolio.html">Portfolio</a></li><li><a href="faq.html">FAQ</a></li>
            <li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li>
            <li><a href="#" id="openLoginModalBtn" class="login-btn"><i class="fas fa-user-circle"></i> Login</a></li>
        </ul>
    </nav>
    <div class="container">
        <h2 class="section-title"><i class="fas fa-envelope-open-text"></i> Get In Touch</h2>
        <div class="contact-wrapper">
            <div class="contact-info">
                <i class="fas fa-phone-alt" style="font-size: 2rem; color:#4ecdc4;"></i>
                <p><strong>Phone:</strong> +256 771 234 567</p>
                <i class="fas fa-envelope" style="font-size: 2rem; color:#4ecdc4; margin-top:1rem;"></i>
                <p><strong>Email:</strong> support@walktech.ug</p>
                <i class="fas fa-clock" style="font-size: 2rem; color:#4ecdc4; margin-top:1rem;"></i>
                <p><strong>Hours:</strong> Mon-Fri: 8am-6pm, Sat: 9am-3pm</p>
                <p style="margin-top:1.5rem"><i class="fab fa-whatsapp"></i> WhatsApp: +256 702 345 678</p>
            </div>
            <div class="contact-form">
                <form id="contactForm">
                    <div class="form-group"><input type="text" id="fullname" placeholder="Full Name" required></div>
                    <div class="form-group"><input type="email" id="email" placeholder="Email Address" required></div>
                    <div class="form-group"><input type="text" id="phone" placeholder="Phone Number"></div>
                    <div class="form-group"><textarea rows="4" id="message" placeholder="Describe your computer issue..." required></textarea></div>
                    <button type="submit">Send Message <i class="fas fa-paper-plane"></i></button>
                    <p id="formFeedback" style="margin-top: 12px;"></p>
                </form>
            </div>
        </div>
    </div>
    <div id="loginModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><i class="fas fa-user-lock" style="font-size: 2.5rem;"></i><h3>Login</h3><form id="loginFormModal"><input type="text" placeholder="Email" required><input type="password" required><button type="submit" class="btn">Login</button></form><div class="demo-note">Demo access</div></div></div>
    <footer><p>&copy; 2025 WalkTech | We'll respond within 2 hours</p></footer>
    <script>
        document.getElementById('contactForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const feedback = document.getElementById('formFeedback');
            feedback.style.color = "#2c7a47";
            feedback.innerHTML = "✅ Message sent! A technician will contact you shortly.";
            e.target.reset();
            setTimeout(() => feedback.innerHTML = "", 4000);
        });
        const modal = document.getElementById('loginModal'), openBtn = document.getElementById('openLoginModalBtn'), closeBtn = document.querySelector('.close-modal');
        openBtn?.addEventListener('click', (e) => { e.preventDefault(); modal.style.display = 'flex'; });
        closeBtn?.addEventListener('click', () => { modal.style.display = 'none'; });
        window.addEventListener('click', (e) => { if(e.target === modal) modal.style.display = 'none'; });
        document.getElementById('loginFormModal')?.addEventListener('submit', (e) => { e.preventDefault(); alert('Demo login'); modal.style.display = 'none'; });
    </script>
</body>
</html>
